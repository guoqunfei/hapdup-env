name: Build HapDup Conda Environment

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: 3.8
          activate-environment: hapdup_env
          channels: conda-forge,bioconda,defaults
          channel-priority: strict

      - name: Install system dependencies
        shell: bash -l {0}
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool cmake samtools bwa minimap2 git pip libhdf5-dev
          conda install htslib setuptools -c conda-forge -c bioconda -y

      - name: Clone HapDup with submodules
        shell: bash -l {0}
        run: |
          cd /tmp
          git clone --recursive https://github.com/fenderglass/hapdup.git
          cd hapdup
          git submodule update --init --recursive

      - name: Patch Flye for GCC 13 compatibility
        shell: bash -l {0}
        run: |
          FLYE_SRC="/tmp/hapdup/submodules/Flye/src"
          for f in $(find "$FLYE_SRC" -type f \( -name "*.h" -o -name "*.cpp" \)); do
            if ! grep -q "#include <cstdint>" "$f"; then
              if grep -qE "uint32_t|uint64_t|int32_t|int64_t|uint16_t|int16_t|uint8_t|int8_t" "$f"; then
                sed -i '1i#include <cstdint>' "$f"
                echo "Patched: $f"
              fi
            fi
          done

      - name: Build and install Flye
        shell: bash -l {0}
        run: |
          pip install setuptools wheel
          cd /tmp/hapdup/submodules/Flye
          python setup.py install

      - name: Build Margin with patched htslib
        shell: bash -l {0}
        run: |
          HTSLIB_DIR="/tmp/hapdup/submodules/margin/externalTools/htslib"
          cd "$HTSLIB_DIR"
          
          # 1. 重新生成 configure（获取最新 config.guess/config.sub）
          autoreconf -fi
          
          # 2. 关键修复：configure 脚本会把 unknown-Linux 传给 config.sub，直接改掉
          sed -i 's/unknown-Linux/linux-gnu/g' configure
          
          # 3. 同时给 config.sub 打补丁，确保接受 unknown-Linux（双重保险）
          sed -i 's/^\(\s*\)\*-\*-\*)/\1*-unknown-linux-gnu | \1*-\*-\*)/' config.sub || true
          
          # 4. 运行 configure（设置 SHLIB_EXT 绕过共享库类型检测）
          SHLIB_EXT=".so" ./configure --disable-libcurl --disable-s3 --disable-gcs
          
          # 5. 编译 Margin
          cd /tmp/hapdup/submodules/margin
          mkdir -p build && cd build
          cmake ..
          make -j4
          cp ./margin $CONDA_PREFIX/bin/

      - name: Install PEPPER
        shell: bash -l {0}
        run: |
          cd /tmp/hapdup/submodules/pepper
          python -m pip install .

      - name: Install HapDup
        shell: bash -l {0}
        run: |
          cd /tmp/hapdup
          python -m pip install .

      - name: Install conda-pack and pack environment
        shell: bash -l {0}
        run: |
          conda install -c conda-forge conda-pack -y
          conda pack -n hapdup_env -o hapdup_env.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hapdup-conda-env
          path: hapdup_env.tar.gz
          retention-days: 30
          compression-level: 0
