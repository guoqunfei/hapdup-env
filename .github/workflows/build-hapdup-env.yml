name: Build HapDup Conda Environment

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: 3.8
          activate-environment: hapdup_env
          channels: conda-forge,bioconda,defaults
          channel-priority: strict

      - name: Install system dependencies
        shell: bash -l {0}
        run: |
          conda install cmake samtools bwa minimap2 git pip -y

      - name: Clone HapDup with submodules
        shell: bash -l {0}
        run: |
          cd /tmp
          git clone --recursive https://github.com/fenderglass/hapdup.git
          cd hapdup
          git submodule update --init --recursive

      - name: Patch Flye for GCC 13 compatibility
        shell: bash -l {0}
        run: |
          # GCC 13+ 要求显式包含 <cstdint>，Flye 老代码缺少这个
          HEADER="/tmp/hapdup/submodules/Flye/src/sequence/sequence_container.h"
          if ! grep -q "#include <cstdint>" "$HEADER"; then
            sed -i '1i#include <cstdint>' "$HEADER"
            echo "Patched $HEADER"
          fi
          # 顺便检查另一个可能出问题的文件
          HEADER2="/tmp/hapdup/submodules/Flye/src/repeat_graph/repeat_graph.h"
          if [ -f "$HEADER2" ] && ! grep -q "#include <cstdint>" "$HEADER2"; then
            sed -i '1i#include <cstdint>' "$HEADER2"
            echo "Patched $HEADER2"
          fi

      - name: Build and install Flye
        shell: bash -l {0}
        run: |
          cd /tmp/hapdup/submodules/Flye
          python setup.py install

      - name: Build and install Margin
        shell: bash -l {0}
        run: |
          cd /tmp/hapdup/submodules/margin
          mkdir -p build && cd build
          cmake .. && make -j4
          cp ./margin $CONDA_PREFIX/bin/

      - name: Install PEPPER
        shell: bash -l {0}
        run: |
          cd /tmp/hapdup/submodules/pepper
          python -m pip install .

      - name: Install HapDup
        shell: bash -l {0}
        run: |
          cd /tmp/hapdup
          python -m pip install .

      - name: Install conda-pack and pack environment
        shell: bash -l {0}
        run: |
          conda install -c conda-forge conda-pack -y
          conda pack -n hapdup_env -o hapdup_env.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hapdup-conda-env
          path: hapdup_env.tar.gz
          retention-days: 30
