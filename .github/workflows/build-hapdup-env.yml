name: Build HapDup Conda Environment

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: 3.8
          activate-environment: hapdup_env
          channels: conda-forge,bioconda,defaults
          channel-priority: strict

      - name: Install system dependencies
        shell: bash -l {0}
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool cmake samtools bwa minimap2 git pip libhdf5-dev libbz2-dev
          conda install htslib setuptools -c conda-forge -c bioconda -y

      - name: Clone HapDup with submodules
        shell: bash -l {0}
        run: |
          cd /tmp
          git clone --recursive https://github.com/fenderglass/hapdup.git
          cd hapdup
          git submodule update --init --recursive

      - name: Patch Flye for GCC 13 compatibility
        shell: bash -l {0}
        run: |
          FLYE_SRC="/tmp/hapdup/submodules/Flye/src"
          for f in $(find "$FLYE_SRC" -type f \( -name "*.h" -o -name "*.cpp" \)); do
            if ! grep -q "#include <cstdint>" "$f"; then
              if grep -qE "uint32_t|uint64_t|int32_t|int64_t|uint16_t|int16_t|uint8_t|int8_t" "$f"; then
                sed -i '1i#include <cstdint>' "$f"
                echo "Patched: $f"
              fi
            fi
          done

      - name: Build and install Flye
        shell: bash -l {0}
        run: |
          pip install setuptools wheel
          cd /tmp/hapdup/submodules/Flye
          python setup.py install

      - name: Build Margin with fully fixed htslib
        shell: bash -l {0}
        run: |
          HTSLIB_DIR="/tmp/hapdup/submodules/margin/externalTools/htslib"
          cd "$HTSLIB_DIR"
          
          # 1. 重新生成 configure
          autoreconf -fi
          
          # 2. 创建 config.guess wrapper
          mv config.guess config.guess.orig
          printf '%s\n' '#!/bin/bash' 'echo "x86_64-pc-linux-gnu"' > config.guess
          chmod +x config.guess
          
          # 3. 创建 config.sub wrapper
          mv config.sub config.sub.orig
          printf '%s\n' '#!/bin/bash' 'if [ "$1" = "unknown-Linux" ] || [ "$1" = "unknown-linux" ] || [ "$1" = "unknown-unknown-Linux" ]; then' '  echo "x86_64-pc-linux-gnu"' '  exit 0' 'fi' 'exec ./config.sub.orig "$@"' > config.sub
          chmod +x config.sub
          
          # 4. 运行 configure
          SHLIB_EXT=".so" ./configure --disable-libcurl --disable-s3 --disable-gcs --disable-bz2 --disable-lzma
          
          # 5. 关键修复：手动生成 version.h（configure 有时不生成这个文件）
          if [ ! -f version.h ]; then
            HTS_VERSION=$(sed -n 's/^m4_define(\[hts_version_release\], \[\([0-9.]*\)\])/\1/p' configure.ac 2>/dev/null || echo "1.9")
            printf '%s\n' "#ifndef HTS_VERSION" "#define HTS_VERSION \"$HTS_VERSION\"" "#endif" > version.h
            echo "Generated version.h with version $HTS_VERSION"
          fi
          
          # 6. 编译 Margin
          cd /tmp/hapdup/submodules/margin
          mkdir -p build && cd build
          cmake ..
          make -j4
          cp ./margin $CONDA_PREFIX/bin/

      - name: Install PEPPER
        shell: bash -l {0}
        run: |
          cd /tmp/hapdup/submodules/pepper
          python -m pip install .

      - name: Install HapDup
        shell: bash -l {0}
        run: |
          cd /tmp/hapdup
          python -m pip install .

      - name: Install conda-pack and pack environment
        shell: bash -l {0}
        run: |
          conda install -c conda-forge conda-pack -y
          conda pack -n hapdup_env -o hapdup_env.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hapdup-conda-env
          path: hapdup_env.tar.gz
          retention-days: 30
          compression-level: 0
