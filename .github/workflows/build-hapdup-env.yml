name: Build HapDup Conda Environment

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: 3.8
          activate-environment: hapdup_env
          channels: conda-forge,bioconda,defaults
          channel-priority: strict

      - name: Install system dependencies
        shell: bash -l {0}
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool cmake samtools bwa minimap2 git pip libhdf5-dev libbz2-dev liblzma-dev
          conda install htslib setuptools pip numpy=1.21 -c conda-forge -c bioconda -y

      - name: Clone HapDup with submodules
        shell: bash -l {0}
        run: |
          cd /tmp
          git clone --recursive https://github.com/fenderglass/hapdup.git
          cd hapdup
          git submodule update --init --recursive

      - name: Patch Flye for GCC 13 compatibility
        shell: bash -l {0}
        run: |
          FLYE_SRC="/tmp/hapdup/submodules/Flye/src"
          for f in $(find "$FLYE_SRC" -type f \( -name "*.h" -o -name "*.cpp" \)); do
            if ! grep -q "#include <cstdint>" "$f"; then
              if grep -qE "uint32_t|uint64_t|int32_t|int64_t|uint16_t|int16_t|uint8_t|int8_t" "$f"; then
                sed -i '1i#include <cstdint>' "$f"
                echo "Patched: $f"
              fi
            fi
          done

      - name: Build and install Flye
        shell: bash -l {0}
        run: |
          pip install setuptools wheel
          cd /tmp/hapdup/submodules/Flye
          python setup.py install

      - name: Build Margin with patched htslib
        shell: bash -l {0}
        run: |
          HTSLIB_DIR="/tmp/hapdup/submodules/margin/externalTools/htslib"
          cd "$HTSLIB_DIR"
          autoreconf -fi
          mv config.guess config.guess.orig
          printf '%s\n' '#!/bin/bash' 'echo "x86_64-pc-linux-gnu"' > config.guess
          chmod +x config.guess
          mv config.sub config.sub.orig
          printf '%s\n' '#!/bin/bash' 'if [ "$1" = "unknown-Linux" ] || [ "$1" = "unknown-linux" ]; then' '  echo "x86_64-pc-linux-gnu"' '  exit 0' 'fi' 'exec ./config.sub.orig "$@"' > config.sub
          chmod +x config.sub
          SHLIB_EXT=".so" ./configure --disable-libcurl --disable-s3 --disable-gcs --disable-bz2 --disable-lzma
          if [ ! -f version.h ]; then
            printf '%s\n' "#ifndef HTS_VERSION" "#define HTS_VERSION \"1.9\"" "#endif" > version.h
          fi
          cd /tmp/hapdup/submodules/margin
          mkdir -p build && cd build
          cmake ..
          make -j4
          cp ./margin $CONDA_PREFIX/bin/

      - name: Pre-patch PEPPER htslib and install
        shell: bash -l {0}
        run: |
          cd /tmp/hapdup/submodules/pepper
          
          # 1. 放宽 numpy 版本（1.16.6 太老，与新版 setuptools 不兼容）
          sed -i "s/numpy==1.16.6/numpy>=1.19/g" setup.py
          
          # 2. 预先下载并修复 htslib，让 PEPPER 的 CMake 跳过下载步骤
          HTSLIB_BUILD_DIR="build/temp.linux-x86_64-cpython-38/htslib/src"
          mkdir -p "$HTSLIB_BUILD_DIR"
          cd "$HTSLIB_BUILD_DIR"
          
          # 下载 htslib-1.9（PEPPER 用的版本）
          wget -q https://github.com/samtools/htslib/releases/download/1.9/htslib-1.9.tar.bz2
          tar xjf htslib-1.9.tar.bz2
          mv htslib-1.9 htslib
          cd htslib
          
          # 修复 autotools
          autoreconf -fi
          mv config.guess config.guess.orig
          printf '%s\n' '#!/bin/bash' 'echo "x86_64-pc-linux-gnu"' > config.guess
          chmod +x config.guess
          mv config.sub config.sub.orig
          printf '%s\n' '#!/bin/bash' 'if [ "$1" = "unknown-Linux" ] || [ "$1" = "unknown-linux" ]; then' '  echo "x86_64-pc-linux-gnu"' '  exit 0' 'fi' 'exec ./config.sub.orig "$@"' > config.sub
          chmod +x config.sub
          
          # 生成 version.h
          printf '%s\n' "#ifndef HTS_VERSION" "#define HTS_VERSION \"1.9\"" "#endif" > version.h
          
          # 3. 安装 PEPPER
          cd /tmp/hapdup/submodules/pepper
          python -m pip install --no-build-isolation .

      - name: Install HapDup
        shell: bash -l {0}
        run: |
          cd /tmp/hapdup
          python -m pip install .

      - name: Install conda-pack and pack environment
        shell: bash -l {0}
        run: |
          conda install -c conda-forge conda-pack -y
          conda pack -n hapdup_env -o hapdup_env.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hapdup-conda-env
          path: hapdup_env.tar.gz
          retention-days: 30
          compression-level: 0
